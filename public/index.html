<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 AI Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f1a;
      --sf: #1a1a2e;
      --sf2: #252540;
      --bd: #2d2d4a;
      --ac: #6C5CE7;
      --ac2: #a29bfe;
      --ok: #00b894;
      --er: #e17055;
      --tx: #e8e8f0;
      --tx2: #9999b8;
      --user-bg: #2d2d5a;
      --ai-bg: #1e1e38;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--tx);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 頂部欄 */
    .topbar {
      background: var(--sf);
      border-bottom: 1px solid var(--bd);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .topbar h1 { font-size: 18px; font-weight: 600; }
    .topbar h1 span { color: var(--ac2); }
    .topbar-info {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--tx2);
      align-items: center;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }
    .status-dot.on { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
    .status-dot.off { background: var(--er); }

    /* 聊天區域 */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px; }

    /* 歡迎訊息 */
    .welcome {
      text-align: center;
      padding: 60px 20px;
      color: var(--tx2);
    }
    .welcome-icon { font-size: 48px; margin-bottom: 16px; }
    .welcome h2 { font-size: 20px; color: var(--tx); margin-bottom: 8px; }
    .welcome p { font-size: 14px; line-height: 1.6; max-width: 400px; margin: 0 auto; }
    .welcome .uid-info {
      margin-top: 16px;
      font-size: 12px;
      padding: 8px 16px;
      background: var(--sf);
      border-radius: 8px;
      display: inline-block;
      font-family: monospace;
    }

    /* 消息氣泡 */
    .msg {
      max-width: 80%;
      animation: fadeIn 0.3s ease;
    }
    .msg.user { align-self: flex-end; }
    .msg.ai { align-self: flex-start; }
    .msg-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
    }
    .msg.ai .msg-bubble {
      background: var(--ai-bg);
      border: 1px solid var(--bd);
      border-bottom-left-radius: 4px;
    }
    .msg-meta {
      font-size: 11px;
      color: var(--tx2);
      margin-top: 4px;
      padding: 0 4px;
    }
    .msg.user .msg-meta { text-align: right; }
    .msg.ai .msg-meta { text-align: left; }

    .complete-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
      margin-left: 6px;
    }
    .complete-tag.ok { background: rgba(0,184,148,.15); color: var(--ok); }
    .complete-tag.warn { background: rgba(253,203,110,.15); color: #fdcb6e; }

    /* 打字動畫 */
    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }
    .typing span {
      width: 8px; height: 8px;
      background: var(--ac2);
      border-radius: 50%;
      animation: bounce 1.4s ease infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 輸入區域 */
    .input-area {
      background: var(--sf);
      border-top: 1px solid var(--bd);
      padding: 16px 20px;
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-wrap {
      flex: 1;
      position: relative;
    }
    .input-wrap textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--bd);
      border-radius: 12px;
      color: var(--tx);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-wrap textarea:focus { border-color: var(--ac); }
    .input-wrap textarea::placeholder { color: var(--tx2); }
    .send-btn {
      padding: 12px 20px;
      background: var(--ac);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }
    .send-btn:hover:not(:disabled) { background: var(--ac2); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .input-hint {
      font-size: 11px;
      color: var(--tx2);
      margin-top: 6px;
      text-align: right;
    }

    /* 錯誤訊息 */
    .error-bubble {
      background: rgba(225,112,85,.1) !important;
      border-color: var(--er) !important;
      color: var(--er);
    }

    /* 響應式 */
    @media (max-width: 640px) {
      .msg { max-width: 90%; }
      .topbar h1 { font-size: 16px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>🤖 <span>AI Chat</span></h1>
  <div class="topbar-info">
    <span><span class="status-dot" id="statusDot"></span><span id="statusText">連線中...</span></span>
    <span id="uidDisplay"></span>
    <span id="msgCount">0 則對話</span>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcomeBlock">
    <div class="welcome-icon">💬</div>
    <h2>AI Chat 聊天室</h2>
    <p>透過公網 AI Gateway 提供智能對話，你的 IP 即是你的身分識別，無需登入即可開始。</p>
    <div class="uid-info" id="uidInfo">載入中...</div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <div class="input-wrap">
      <textarea id="msgInput" rows="1" placeholder="輸入訊息..." 
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="send()" disabled>發送</button>
  </div>
  <div class="input-hint">Enter 發送 · Shift+Enter 換行</div>
</div>

<script>
// ---- 配置 ----
const API_BASE = window.location.pathname.replace(/\/$/, '') || '.';

// ---- 狀態 ----
let userId = '';
let messages = []; // { role: 'user'|'ai', content: string, meta?: object }
let isSending = false;
let gatewayOnline = false;

// ---- 初始化 ----
async function init() {
  // 1. 取得用戶 ID（基於公網 IP）
  try {
    const ipRes = await fetch('https://api.ipify.org?format=json');
    const ipData = await ipRes.json();
    const publicIP = ipData.ip;
    userId = `ip_${publicIP.replace(/\./g, '_')}`;
    document.getElementById('uidInfo').textContent = `你的識別: ${userId} (IP: ${publicIP})`;
    document.getElementById('uidDisplay').textContent = `ID: ${publicIP}`;
  } catch (e) {
    // 備用：用時間戳 + 隨機數
    userId = `user_${Date.now()}_${Math.random().toString(36).substring(2, 8)}`;
    document.getElementById('uidInfo').textContent = `你的識別: ${userId}`;
    document.getElementById('uidDisplay').textContent = `ID: local`;
  }

  // 2. 檢查 Gateway 連線
  try {
    const healthRes = await fetch(`${API_BASE}/api/health`);
    const health = await healthRes.json();
    gatewayOnline = true;
    setStatus(true, 'Gateway 在線');
  } catch (e) {
    gatewayOnline = false;
    setStatus(false, 'Gateway 離線');
  }

  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').focus();

  // 自動調整 textarea 高度
  const ta = document.getElementById('msgInput');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  });
}

function setStatus(online, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = `status-dot ${online ? 'on' : 'off'}`;
  txt.textContent = text;
}

// ---- 發送訊息 ----
async function send() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isSending) return;

  isSending = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  // 隱藏歡迎區
  const wb = document.getElementById('welcomeBlock');
  if (wb) wb.style.display = 'none';

  // 顯示用戶消息
  addMessage('user', text);
  setStatus(true, '思考中...');

  // 顯示打字動畫
  const typingEl = showTyping();

  try {
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        user_id: userId,
        history: messages.slice(-10) // 帶最近 10 則作為上下文
      })
    });

    const data = await res.json();
    removeTyping(typingEl);

    if (data.success) {
      const meta = data.reply_meta || {};
      const completeTag = meta.likely_complete
        ? `<span class="complete-tag ok">✅ 完整</span>`
        : `<span class="complete-tag warn">⚠️ 可能截斷</span>`;

      addMessage('ai', data.response, {
        duration: data.duration_ms ? `${(data.duration_ms / 1000).toFixed(1)}s` : '—',
        context: data.context_used ? '有上下文' : '無上下文',
        length: meta.length || 0,
        completeTag
      });
    } else {
      addMessage('ai', `❌ 錯誤: ${data.error || '未知錯誤'}`, { isError: true });
    }
  } catch (err) {
    removeTyping(typingEl);
    addMessage('ai', `❌ 網路錯誤: ${err.message}`, { isError: true });
    setStatus(false, '連線失敗');
  }

  isSending = false;
  document.getElementById('sendBtn').disabled = false;
  setStatus(true, 'Gateway 在線');
  input.focus();
}

// ---- UI 輔助 ----
function addMessage(role, content, meta = {}) {
  messages.push({ role, content });
  document.getElementById('msgCount').textContent = `${messages.length} 則對話`;

  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const bubble = document.createElement('div');
  bubble.className = `msg-bubble ${meta.isError ? 'error-bubble' : ''}`;
  bubble.textContent = content;
  div.appendChild(bubble);

  if (role === 'ai' && !meta.isError) {
    const metaDiv = document.createElement('div');
    metaDiv.className = 'msg-meta';
    metaDiv.innerHTML = [
      meta.completeTag || '',
      meta.duration ? `⏱ ${meta.duration}` : '',
      meta.context ? `📖 ${meta.context}` : '',
      meta.length ? `📝 ${meta.length} 字` : ''
    ].filter(Boolean).join(' · ');
    div.appendChild(metaDiv);
  }

  if (role === 'user') {
    const metaDiv = document.createElement('div');
    metaDiv.className = 'msg-meta';
    metaDiv.textContent = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    div.appendChild(metaDiv);
  }

  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function removeTyping(el) {
  if (el && el.parentNode) el.parentNode.removeChild(el);
}

// 啟動
init();
</script>
</body>
</html>
